paths:
  /v1/auth/login:
    post:
      consumes:
      - application/json
      description: Verify Login with email and password
      parameters:
      - description: Verify Login
        in: body
        name: auth
        required: true
        schema:
          $ref: '#/definitions/dto.LoginRequest'
      produces:
      - application/json
      responses:
        "201":
          description: User created successfully
          schema:
            $ref: '#/definitions/common.BaseApiResponse-bool'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/common.BaseApiResponse-any'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/common.BaseApiResponse-any'
      summary: Verify Login with email and password
      tags:
      - Authentication
  /v1/auth/refresh-token:
    post:
      consumes:
      - application/json
      description: Get new AccessToken and RefreshToken
      parameters:
      - description: Register
        in: body
        name: auth
        required: true
        schema:
          $ref: '#/definitions/dto.RefreshTokenRequest'
      produces:
      - application/json
      responses:
        "201":
          description: User created successfully
          schema:
            $ref: '#/definitions/common.BaseApiResponse-bool'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/common.BaseApiResponse-any'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/common.BaseApiResponse-any'
      summary: Get new AccessToken and RefreshToken
      tags:
      - Authentication
  /v1/auth/register:
    post:

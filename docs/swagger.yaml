basePath: /api
definitions:
  common.BaseApiResponse-any:
    properties:
      data: {}
      http_request_status:
        type: integer
      message:
        type: string
      success:
        type: boolean
    type: object
  common.BaseApiResponse-bool:
    properties:
      data:
        type: boolean
      http_request_status:
        type: integer
      message:
        type: string
      success:
        type: boolean
    type: object
  common.Pagination:
    properties:
      count:
        type: integer
      index:
        type: integer
      size:
        type: integer
    type: object
  common.PaginationRequest:
    properties:
      index:
        type: integer
      size:
        type: integer
    type: object
  dto.ForgotPasswordRequest:
    properties:
      email:
        type: string
    required:
    - email
    type: object
  dto.LoginRequest:
    properties:
      email:
        type: string
      password:
        minLength: 8
        type: string
    required:
    - email
    - password
    type: object
  dto.RefreshTokenRequest:
    properties:
      refresh_token:
        minLength: 8
        type: string
      token:
        type: string
    required:
    - refresh_token
    - token
    type: object
  dto.RegisterRequest:
    properties:
      email:
        type: string
      password:
        minLength: 8
        type: string
    required:
    - email
    - password
    type: object
  dto.ResetPasswordRequest:
    properties:
      code:
        type: string
      email:
        type: string
      new_password:
        minLength: 8
        type: string
      new_password_confirmation:
        minLength: 8
        type: string
    required:
    - code
    - email
    - new_password
    - new_password_confirmation
    type: object
  dto.SendEmailVerificationCodeRequest:
    properties:
      email:
        type: string
    required:
    - email
    type: object
  dto.VerifyEmailRegistrationCodeRequest:
    properties:
      code:
        type: string
      email:
        type: string
    required:
    - code
    - email
    type: object
  dto.VerifyResetPasswordCodeRequest:
    properties:
      code:
        type: string
      email:
        type: string
    required:
    - code
    - email
    type: object
  model.Order:
    properties:
      ID:
        type: string
      broker:
        description: okx, binance
        type: string
      broker_order_id:
        type: string
      close:
        type: number
      createdAt:
        type: string
      decision:
        description: long, short, buy, sell
        type: string
      entry:
        type: number
      pair:
        description: BTC/USDT
        type: string
      profit_n_loss:
        type: number
      strategy:
        description: MACD
        type: string
      type:
        description: futures, spot
        type: string
    type: object
  model.OrderAddRequest:
    type: object
  model.OrderGetListRequest:
    properties:
      Pagination:
        $ref: '#/definitions/common.PaginationRequest'
    type: object
  model.OrderGetListResponse:
    properties:
      List:
        items:
          $ref: '#/definitions/model.Order'
        type: array
      Paging:
        $ref: '#/definitions/common.Pagination'
    type: object
  model.OrderGetResponse:
    type: object
  model.OrderUpdateRequest:
    type: object
  model.Otp:
    properties:
      ID:
        type: string
      code:
        type: string
      createdAt:
        type: string
      expiresAt:
        type: string
      type:
        type: string
      used:
        type: boolean
      userID:
        type: string
    type: object
  model.OtpGetListRequest:
    properties:
      Pagination:
        $ref: '#/definitions/common.PaginationRequest'
    type: object
  model.OtpGetListResponse:
    properties:
      List:
        items:
          $ref: '#/definitions/model.Otp'
        type: array
      Paging:
        $ref: '#/definitions/common.Pagination'
    type: object
  model.OtpGetResponse:
    type: object
  model.OtpUpdateRequest:
    type: object
  model.User:
    properties:
      ID:
        type: string
      country_code:
        type: string
      createdAt:
        type: string
      email:
        type: string
      first_name:
        type: string
      is_email_verified:
        type: boolean
      last_name:
        type: string
      phone_number:
        type: string
      profile_imageUrl:
        type: string
      role:
        example: super_admin
        type: string
      status:
        example: active
        type: string
    type: object
  model.UserAddRequest:
    properties:
      password:
        type: string
      phone_number:
        type: string
    required:
    - password
    - phone_number
    type: object
  model.UserUpdatePasswordRequest:
    properties:
      new_password:
        minLength: 8
        type: string
      new_password_confirmation:
        minLength: 8
        type: string
      old_password:
        minLength: 8
        type: string
    required:
    - new_password
    - new_password_confirmation
    - old_password
    type: object
  model.UserUpdateRequest:
    type: object
  telegram.SendMessageRequest:
    description: Request body for sending a Telegram message
    properties:
      chat_id:
        description: Chat ID where the message will be sent
        example: "-1001234567890"
        type: string
      parse_mode:
        description: Parse mode for the message (HTML, Markdown, etc.)
        example: HTML
        type: string
      text:
        description: Message text to be sent
        example: Hello from J-AI-Trade!
        type: string
    type: object
host: localhost:80
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: J-AI-Trade API for cryptocurrency trading and management
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  title: J-AI-Trade API
  version: "1.0"
paths:
  /v1/auth/login:
    post:
      consumes:
      - application/json
      description: Verify Login with email and password
      parameters:
      - description: Verify Login
        in: body
        name: auth
        required: true
        schema:
          $ref: '#/definitions/dto.LoginRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Logged in successfully
          schema:
            $ref: '#/definitions/common.BaseApiResponse-bool'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/common.BaseApiResponse-any'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/common.BaseApiResponse-any'
      summary: Verify Login with email and password
      tags:
      - Authentication
  /v1/auth/refresh-token:
    post:
      consumes:
      - application/json
      description: Get new AccessToken and RefreshToken
      parameters:
      - description: Register
        in: body
        name: auth
        required: true
        schema:
          $ref: '#/definitions/dto.RefreshTokenRequest'
      produces:
      - application/json
      responses:
        "201":
          description: User created successfully
          schema:
            $ref: '#/definitions/common.BaseApiResponse-bool'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/common.BaseApiResponse-any'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/common.BaseApiResponse-any'
      summary: Get new AccessToken and RefreshToken
      tags:
      - Authentication
  /v1/auth/register:
    post:
      consumes:
      - application/json
      description: Register with email and password
      parameters:
      - description: Register
        in: body
        name: auth
        required: true
        schema:
          $ref: '#/definitions/dto.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: User created successfully
          schema:
            $ref: '#/definitions/common.BaseApiResponse-bool'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/common.BaseApiResponse-any'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/common.BaseApiResponse-any'
      summary: Register with email and password
      tags:
      - Authentication
  /v1/auth/reset-password:
    post:
      consumes:
      - application/json
      description: Reset password with new password
      parameters:
      - description: Reset password
        in: body
        name: auth
        required: true
        schema:
          $ref: '#/definitions/dto.ResetPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Password reset successfully
          schema:
            $ref: '#/definitions/common.BaseApiResponse-bool'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/common.BaseApiResponse-any'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/common.BaseApiResponse-any'
      summary: Reset password
      tags:
      - Authentication
  /v1/auth/send-email-registration-code:
    post:
      consumes:
      - application/json
      description: Send registration code verification
      parameters:
      - description: Send registration code verification
        in: body
        name: auth
        required: true
        schema:
          $ref: '#/definitions/dto.SendEmailVerificationCodeRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Sent registration code successfully
          schema:
            $ref: '#/definitions/common.BaseApiResponse-bool'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/common.BaseApiResponse-any'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/common.BaseApiResponse-any'
      summary: Send registration code verification
      tags:
      - Authentication
  /v1/auth/send-forgot-password-code:
    post:
      consumes:
      - application/json
      description: Send reset password code to user's email
      parameters:
      - description: Send reset password code
        in: body
        name: auth
        required: true
        schema:
          $ref: '#/definitions/dto.ForgotPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Reset password code sent successfully
          schema:
            $ref: '#/definitions/common.BaseApiResponse-bool'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/common.BaseApiResponse-any'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/common.BaseApiResponse-any'
      summary: Send reset password code
      tags:
      - Authentication
  /v1/auth/verify-email-registration-code:
    post:
      consumes:
      - application/json
      description: Verify registration code
      parameters:
      - description: Verify registration code
        in: body
        name: auth
        required: true
        schema:
          $ref: '#/definitions/dto.VerifyEmailRegistrationCodeRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Verified registration code successfully
          schema:
            $ref: '#/definitions/common.BaseApiResponse-bool'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/common.BaseApiResponse-any'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/common.BaseApiResponse-any'
      summary: Verify registration code
      tags:
      - Authentication
  /v1/auth/verify-reset-password-code:
    post:
      consumes:
      - application/json
      description: Verify reset password code
      parameters:
      - description: Verify reset password code
        in: body
        name: auth
        required: true
        schema:
          $ref: '#/definitions/dto.VerifyResetPasswordCodeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Reset password code verified successfully
          schema:
            $ref: '#/definitions/common.BaseApiResponse-bool'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/common.BaseApiResponse-any'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/common.BaseApiResponse-any'
      summary: Verify reset password code
      tags:
      - Authentication
  /v1/order/create:
    post:
      description: Create a new Order
      parameters:
      - description: Create Order
        in: body
        name: Order
        required: true
        schema:
          $ref: '#/definitions/model.OrderAddRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.OrderGetResponse'
      security:
      - Bearer: []
      summary: Create new Order
      tags:
      - Order
  /v1/order/delete/{id}:
    delete:
      description: Delete a new Order
      parameters:
      - description: User UUID
        format: uuid
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.Order'
      security:
      - Bearer: []
      summary: Delete new Order
      tags:
      - Order
  /v1/order/get/{id}:
    get:
      description: Return Order
      parameters:
      - description: User UUID
        format: uuid
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.OrderGetResponse'
      security:
      - Bearer: []
      summary: Get Order
      tags:
      - Order
  /v1/order/list:
    post:
      description: Retrieve a list of Orders based on provided filters and pagination
      parameters:
      - description: Get Orders
        in: body
        name: Order
        required: true
        schema:
          $ref: '#/definitions/model.OrderGetListRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.OrderGetListResponse'
      security:
      - Bearer: []
      summary: Get a list of Order
      tags:
      - Order
  /v1/order/update/{id}:
    put:
      description: Update Order
      parameters:
      - description: User UUID
        format: uuid
        in: path
        name: id
        required: true
        type: string
      - description: Update User
        in: body
        name: user
        required: true
        schema:
          $ref: '#/definitions/model.OrderUpdateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.OrderGetResponse'
      security:
      - Bearer: []
      summary: Update Order
      tags:
      - Order
  /v1/otp/create:
    post:
      description: Create a new Otp
      parameters:
      - description: Create Otp
        in: body
        name: Otp
        required: true
        schema:
          $ref: '#/definitions/model.Otp'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.Otp'
      security:
      - Bearer: []
      summary: Create new Otp
      tags:
      - Otp
  /v1/otp/delete/{id}:
    delete:
      description: Delete a new Otp
      parameters:
      - description: User UUID
        format: uuid
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.Otp'
      security:
      - Bearer: []
      summary: Delete new Otp
      tags:
      - Otp
  /v1/otp/get/{id}:
    get:
      description: Return Otp
      parameters:
      - description: User UUID
        format: uuid
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.OtpGetResponse'
      security:
      - Bearer: []
      summary: Get Otp
      tags:
      - Otp
  /v1/otp/list:
    post:
      description: Retrieve a list of Otps based on provided filters and pagination
      parameters:
      - description: Get Otps
        in: body
        name: Otp
        required: true
        schema:
          $ref: '#/definitions/model.OtpGetListRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.OtpGetListResponse'
      security:
      - Bearer: []
      summary: Get a list of Otp
      tags:
      - Otp
  /v1/otp/update/{id}:
    put:
      description: Update Otp
      parameters:
      - description: User UUID
        format: uuid
        in: path
        name: id
        required: true
        type: string
      - description: Update User
        in: body
        name: user
        required: true
        schema:
          $ref: '#/definitions/model.OtpUpdateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.OtpGetResponse'
      security:
      - Bearer: []
      summary: Update Otp
      tags:
      - Otp
  /v1/password/user/update/{id}:
    put:
      description: Update User Password
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      - description: Update User
        in: body
        name: User
        required: true
        schema:
          $ref: '#/definitions/model.UserUpdatePasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.User'
      security:
      - Bearer: []
      summary: Update User Password
      tags:
      - User
  /v1/telegram/send:
    post:
      consumes:
      - application/json
      description: Send a message to the configured Telegram channel
      parameters:
      - description: Message details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/telegram.SendMessageRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/common.BaseApiResponse-bool'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/common.BaseApiResponse-any'
      summary: Send a message to Telegram channel
      tags:
      - Telegram
  /v1/user/create:
    post:
      description: Create a new User
      parameters:
      - description: Create User
        in: body
        name: User
        required: true
        schema:
          $ref: '#/definitions/model.UserAddRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.User'
      security:
      - Bearer: []
      summary: Create new User
      tags:
      - User
  /v1/user/dekete/{id}:
    delete:
      description: Delete a new User
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.User'
      security:
      - Bearer: []
      summary: Delete new User
      tags:
      - User
  /v1/user/get/{id}:
    get:
      description: Return User
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.User'
      security:
      - Bearer: []
      summary: Get User
      tags:
      - User
  /v1/user/list:
    get:
      description: Retrieve a list of Users based on provided filters and pagination
      parameters:
      - default: 1
        description: Page number
        in: query
        name: page_number
        type: integer
      - default: 10
        description: Page size
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/model.User'
            type: array
      security:
      - Bearer: []
      summary: Get a list of User
      tags:
      - User
  /v1/user/update/{id}:
    put:
      description: Update User
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      - description: Update User
        in: body
        name: User
        required: true
        schema:
          $ref: '#/definitions/model.UserUpdateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.User'
      security:
      - Bearer: []
      summary: Update User
      tags:
      - User
securityDefinitions:
  Bearer:
    description: Type "Bearer" followed by a space and JWT token.
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
